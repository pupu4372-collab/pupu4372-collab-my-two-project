<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=SUIT+Variable:wght@100..900&amp;display=swap" rel="stylesheet"/>
<title>K-Saju Pet | 로그인</title>
<style>
        body {
            font-family: 'SUIT Variable', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .bg-dream-sky {
            background: linear-gradient(135deg, #FDFBF7 0%, #E6E1F9 40%, #E1F5F0 70%, #FCE1F1 100%);
            background-size: 400% 400%;
            animation: skyGradient 15s ease infinite;
        }
        @keyframes skyGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pastel-input:focus {
            box-shadow: 0 0 0 2px rgba(68, 38, 86, 0.1);
        }
    </style>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"secondary-fixed-dim": "#dfc0b0", "on-surface": "#1b1c1a", "on-tertiary-fixed-variant": "#454b0a", "surface-container": "#efeeea", "outline-variant": "#cec3ce", lavender: "#E6E1F9", "surface-dim": "#dbdad6", "primary-fixed": "#f5d9ff", "inverse-primary": "#dfb9f2", "primary-container": "#5c3d6e", "on-tertiary-fixed": "#1a1d00", mint: "#E1F5F0", "to-yellow": "#F59E0B", "surface-container-lowest": "#ffffff", "on-primary-fixed-variant": "#593a6b", "primary-fixed-dim": "#dfb9f2", "mok-green": "#22C55E", blush: "#FDECE7", surface: "#fbf9f5", "on-primary": "#ffffff", "tertiary-container": "#474d0d", "tertiary-fixed-dim": "#c5cc7f", "su-black": "#334155", "on-secondary-container": "#755e50", outline: "#7d747e", "on-secondary": "#ffffff", "on-primary-container": "#d1abe4", "hwa-red": "#EF4444", "on-tertiary-container": "#b7be73", "error-container": "#ffdad6", "inverse-on-surface": "#f2f0ed", "channel-saju": "#8B5CF6", "surface-container-low": "#f5f3ef", "secondary-fixed": "#fcdccb", "on-secondary-fixed-variant": "#574236", "on-background": "#1b1c1a", "surface-bright": "#fbf9f5", "channel-cat": "#EF4444", "channel-community": "#22C55E", "surface-container-highest": "#e4e2de", background: "#fbf9f5", secondary: "#715a4c", sand: "#F5F1E9", "geum-white": "#94A3B8", "on-secondary-fixed": "#28180d", petal: "#FCE1F1", "channel-dog": "#3B82F6", primary: "#442656", "inverse-surface": "#30312e", cream: "#FDFBF7", "surface-variant": "#e4e2de", "surface-container-high": "#eae8e4", "on-error": "#ffffff", "on-surface-variant": "#4b444d", "surface-tint": "#725284", "tertiary-fixed": "#e1e999", "on-error-container": "#93000a", error: "#ba1a1a", "secondary-container": "#f9d9c8", "on-tertiary": "#ffffff", "on-primary-fixed": "#2b0d3c", tertiary: "#313600"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {gutter: "1.5rem", "page-margin-mobile": "1.25rem", "page-margin-desktop": "4rem", "section-gap": "5rem", "card-padding": "2rem"}, fontFamily: {"body-sm": ["SUIT Variable"], "body-md": ["SUIT Variable"], "headline-sm": ["SUIT Variable"], "headline-lg": ["SUIT Variable"], "body-lg": ["SUIT Variable"], "display-hero": ["SUIT Variable"], "label-caps": ["SUIT Variable"], "headline-md": ["SUIT Variable"], "display-hero-mobile": ["SUIT Variable"], "headline-sm-mobile": ["SUIT Variable"], "headline-md-mobile": ["SUIT Variable"], headline: ["SUIT Variable"], display: ["SUIT Variable"], body: ["SUIT Variable"], label: ["SUIT Variable"]}, fontSize: {"body-sm": ["14px", {lineHeight: "1.5", fontWeight: "400"}], "body-md": ["16px", {lineHeight: "1.6", fontWeight: "400"}], "headline-sm": ["20px", {lineHeight: "1.4", fontWeight: "600"}], "headline-sm-mobile": ["18px", {lineHeight: "1.4", fontWeight: "600"}], "headline-lg": ["32px", {lineHeight: "1.3", fontWeight: "700"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}], "display-hero": ["42px", {lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "800"}], "label-caps": ["12px", {lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700"}], "headline-md": ["24px", {lineHeight: "1.4", fontWeight: "700"}], "headline-md-mobile": ["22px", {lineHeight: "1.4", fontWeight: "700"}], "display-hero-mobile": ["32px", {lineHeight: "1.2", fontWeight: "800"}]}}}};</script>
</head>
<body class="bg-dream-sky min-h-screen flex items-center justify-center p-4">
<!-- Suppression Logic: TopAppBar and BottomNavBar are hidden for transactional screen -->
<main class="w-full max-w-md animate-fade-in">
<div class="glass-effect rounded-[2rem] p-8 md:p-10 shadow-sm shadow-primary/5 border border-white/40">
<!-- Header Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-6 shadow-sm border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight mb-2">K-Saju Pet</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-70">당신의 반려동물과 하늘이 맺어준 인연</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5" method="POST">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="email">이메일 주소</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-50" data-icon="mail">mail</span>
<input class="pastel-input w-full bg-sand/50 border-none rounded-[1rem] py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 transition-all" id="email" name="email" placeholder="이메일을 입력해주세요" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="password">비밀번호</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-50" data-icon="lock">lock</span>
<input class="pastel-input w-full bg-sand/50 border-none rounded-[1rem] py-4 pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 transition-all" id="password" name="password" placeholder="비밀번호를 입력해주세요" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-2">
<label class="flex items-center cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-5 h-5 bg-sand/80 border border-outline-variant/30 rounded-md peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px] hidden peer-checked:block" data-icon="check">check</span>
</div>
</div>
<span class="ml-2 font-body-sm text-body-sm text-on-surface-variant group-hover:text-primary transition-colors">로그인 상태 유지</span>
</label>
<a class="font-body-sm text-body-sm text-primary font-medium hover:underline" href="#">비밀번호를 잊으셨나요?</a>
</div>
<button class="w-full bg-primary text-white py-4 px-6 rounded-full font-headline-sm text-headline-sm hover:opacity-90 active:scale-95 transition-all shadow-md shadow-primary/20 mt-4" type="submit">
                    로그인
                </button>
</form>
<!-- Bottom Actions -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 text-center space-y-4">
<div class="flex items-center justify-center space-x-2 text-on-surface-variant">
<span class="font-body-sm text-body-sm">계정이 없으신가요?</span>
<a class="font-body-sm text-body-sm text-primary font-bold hover:underline" href="#">회원가입</a>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-60">
                    이메일로 로그인해 집사 자격을 확인해보세요
                </p>
</div>
</div>
<!-- Decorative Element -->
<div class="mt-8 flex justify-center space-x-6 opacity-40">
<div class="w-12 h-12 rounded-full glass-effect flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="pets">pets</span>
</div>
<div class="w-12 h-12 rounded-full glass-effect flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="stars">stars</span>
</div>
<div class="w-12 h-12 rounded-full glass-effect flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="favorite">favorite</span>
</div>
</div>
</main>
<script>
        // Micro-interaction: Password visibility toggle
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Atmospheric micro-interaction for the card
        const card = document.querySelector('.glass-effect');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = 'all 0.5s ease';
        });

        document.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });
    </script>
</body></html>
