<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #f5d9ff 0%, #ffffff 50%, #e1e999 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dream-sky-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(245, 217, 255, 0.6) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(197, 204, 127, 0.4) 0%, transparent 50%);
            z-index: -1;
            animation: drift 20s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1); }
            to { transform: scale(1.1) rotate(2deg); }
        }

        .fade-in-up {
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shimmer {
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.8) 50%, 
                rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .loading-bar-fill {
            width: 0%;
            animation: load 3.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            10% { width: 5%; }
            40% { width: 60%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }

        .glass-glow {
            box-shadow: 0 0 40px 10px rgba(223, 185, 242, 0.3);
        }
    </style>

<body class="font-body-md text-on-surface">

<!-- Subtle Floating Particles Micro-interaction -->
<div class="fixed inset-0 pointer-events-none z-0" id="particles"></div>
<script>
        // Simple ambient particle effect
        const particleContainer = document.getElementById('particles');
        const colors = ['#f5d9ff', '#e1e999', '#ffffff'];
        
        for (let i = 0; i < 15; i++) {
            const dot = document.createElement('div');
            const size = Math.random() * 6 + 4;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.background = colors[Math.floor(Math.random() * colors.length)];
            dot.style.opacity = Math.random() * 0.4 + 0.1;
            dot.style.borderRadius = '50%';
            dot.style.position = 'absolute';
            dot.style.top = `${Math.random() * 100}vh`;
            dot.style.left = `${Math.random() * 100}vw`;
            dot.style.filter = 'blur(2px)';
            
            particleContainer.appendChild(dot);
            
            // Subtle movement
            const duration = Math.random() * 20 + 20;
            const delay = Math.random() * -20;
            
            dot.animate([
                { transform: 'translate(0, 0)' },
                { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px)` }
            ], {
                duration: duration * 1000,
                delay: delay * 1000,
                iterations: Infinity,
                direction: 'alternate',
                easing: 'linear'
            });
        }

        // Logic for splash screen timeout (simulated)
        window.addEventListener('load', () => {
            setTimeout(() => {
                // In a real app, this would trigger navigation
                console.log('Splash screen complete. Navigating to Home...');
            }, 4000);
        });
    </script>
