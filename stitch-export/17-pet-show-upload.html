<style>

</header>
<!-- Post Form Container -->
<div class="pastel-card rounded-2rem p-8 md:p-12 shadow-sm">
<form class="space-y-10" id="uploadForm">
<!-- Photo Upload Area -->
<section>
<label class="block font-headline-sm text-headline-sm text-primary mb-4">사진 업로드</label>
<div class="relative group cursor-pointer">
<input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer" id="petPhoto" type="file"/>
<div class="border-2 border-dashed border-outline-variant rounded-2rem p-12 flex flex-col items-center justify-center bg-white/30 group-hover:bg-white/50 transition-all duration-300 min-h-[320px]">
<div class="w-20 h-20 rounded-full bg-lavender flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="photo_camera">photo_camera</span>
</div>
<span class="font-headline-sm text-headline-sm text-primary mb-2">사진 선택하기</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">권장 사이즈: 4:3 또는 1:1, 최대 10MB</p>
</div>
</div>
</section>
<!-- Pet Selection -->
<section>
<label class="block font-headline-sm text-headline-sm text-primary mb-4">반려동물 선택</label>
<div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
<label class="flex-shrink-0 cursor-pointer group">
<input checked="" class="hidden peer" name="pet_select" type="radio"/>
<div class="flex flex-col items-center gap-2 p-3 rounded-xl peer-checked:bg-lavender transition-all">
<div class="w-16 h-16 rounded-full overflow-hidden border-2 border-transparent peer-checked:border-primary">
<img class="w-full h-full object-cover" data-alt="A portrait of a fluffy white Pomeranian dog with bright, intelligent eyes, sitting gracefully in a sunlit modern interior with soft pastel accents of mint and cream. The lighting is warm and ethereal, highlighting the texture of its fur against a clean, minimalist background. The overall mood is joyful and premium." src="/stitch/asset-49.jpg"/>
</div>
<span class="font-body-sm text-body-sm text-primary font-bold">초코</span>
</div>
</label>
<label class="flex-shrink-0 cursor-pointer group">
<input class="hidden peer" name="pet_select" type="radio"/>
<div class="flex flex-col items-center gap-2 p-3 rounded-xl peer-checked:bg-lavender transition-all">
<div class="w-16 h-16 rounded-full overflow-hidden border-2 border-transparent peer-checked:border-primary">
<img class="w-full h-full object-cover" data-alt="A sleek ginger tabby cat lounging on a soft lavender-colored velvet cushion. The setting is a bright, high-end room with soft morning light streaming through large windows. The aesthetic is clean and modern, focusing on the calm and sophisticated personality of the feline subject." src="/stitch/asset-50.jpg"/>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-primary transition-colors">나비</span>
</div>
</label>
<button class="flex-shrink-0 flex flex-col items-center gap-2 p-3" type="button">
<div class="w-16 h-16 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center text-outline hover:text-primary hover:border-primary transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant">추가하기</span>
</button>
</div>
</section>
<!-- Title & Story -->
<section class="space-y-6">
<div>
<label class="block font-headline-sm text-headline-sm text-primary mb-2">제목</label>
<input class="pastel-input w-full p-4 rounded-xl font-body-md text-body-md text-primary" placeholder="아이의 매력을 한 줄로 소개해주세요!" type="text"/>
</div>
<div>
<label class="block font-headline-sm text-headline-sm text-primary mb-2">이야기</label>
<textarea class="pastel-input w-full p-4 rounded-xl font-body-md text-body-md text-primary resize-none" placeholder="아이의 소중한 순간에 대한 이야기를 들려주세요 (예: 산책 다녀와서 기분이 좋아요!)" rows="5"></textarea>
</div>
</section>
<!-- Species Category -->
<section>
<label class="block font-headline-sm text-headline-sm text-primary mb-4">카테고리</label>
<div class="flex flex-wrap gap-3">
<div class="relative">
<input checked="" class="hidden custom-radio" id="species-dog" name="species" type="radio"/>
<label class="px-6 py-2 rounded-full border border-primary text-primary font-body-md text-body-md cursor-pointer hover:bg-lavender transition-all" for="species-dog">강아지</label>

<input class="hidden custom-radio" id="species-other" name="species" type="radio"/>

<div class="flex flex-col md:flex-row gap-4 pt-8">
<button class="w-full md:flex-1 py-4 px-8 rounded-full bg-primary text-cream font-headline-sm text-headline-sm hover:opacity-90 active:scale-95 transition-all shadow-md" type="button">
                        자랑하기

</div>

<script>
        // Micro-interactions
        const photoUpload = document.getElementById('petPhoto');
        const uploadArea = photoUpload.nextElementSibling;

        photoUpload.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    uploadArea.innerHTML = `
                        <div class="w-full h-full absolute inset-0 rounded-2rem overflow-hidden">
                            <img src="${event.target.result}" class="w-full h-full object-cover" />
                            <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                <span class="text-white font-bold">사진 변경하기</span>
                            </div>
                        </div>
                    `;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Form submission animation mock
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            setTimeout(() => {
                alert('자랑하기 글이 성공적으로 등록되었습니다!');
                window.location.reload();
            }, 1500);
        });
    </script>
